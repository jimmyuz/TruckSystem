<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TCC - Operations Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; display: flex; height: 100vh; margin: 0; }
        #sidebar { width: 260px; background: #1a1d21; color: white; }
        .main-content { flex-grow: 1; padding: 20px; overflow-y: auto; }
        .chart-mock { height: 200px; background: #f1f3f5; border: 1px dashed #ced4da; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #adb5bd; }
    </style>
</head>
<body>
    <aside id="sidebar" class="p-4"><h3>TCC</h3><p class="small">Analytics Hub</p></aside>
    <main class="main-content">
        <h4 class="mb-4">Operational Efficiency Metrics</h4>
        <div class="row g-4">
            <div class="col-md-6">
                <div class="card p-3 shadow-sm">
                    <h6>Avg. Idle Time per Truck</h6>
                    <div class="chart-mock mt-3">[ Bar Chart: Truck ID vs Time ]</div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-3 shadow-sm">
                    <h6>Waiting Period for Consignments</h6>
                    <div class="chart-mock mt-3">[ Trend Line: Days of Week ]</div>
                </div>
            </div>
            <div class="col-md-12">
                <div class="card p-3 shadow-sm">
                    <h6>Capacity Utilization (Fleet Load %)</h6>
                    <div class="chart-mock mt-3">[ Radar/Pie Chart: Current Efficiency 78% ]</div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
