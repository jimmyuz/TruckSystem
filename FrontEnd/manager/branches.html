<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TCC - Branch Records</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; display: flex; height: 100vh; margin: 0; }
        #sidebar { width: 260px; background: #1a1d21; color: white; }
        .main-content { flex-grow: 1; padding: 20px; }
        .branch-card { background: white; padding: 15px; border-radius: 8px; border-left: 5px solid #3498db; }
    </style>
</head>
<body>
    <aside id="sidebar" class="p-4"><h3>TCC</h3><p class="small">Branch Mgmt</p></aside>
    <main class="main-content">
        <div class="d-flex justify-content-between mb-4">
            <h4>Branch Office Directory</h4>
            <button class="btn btn-primary btn-sm">+ Add New Branch</button>
        </div>
        <div class="row g-3">
            <div class="col-md-4"><div class="branch-card shadow-sm"><h6>Nairobi Branch (HQ)</h6><p class="small text-muted m-0">Manager: John Doe<br>Contact: 0712 345 678</p></div></div>
            <div class="col-md-4"><div class="branch-card shadow-sm"><h6>Mombasa Branch</h6><p class="small text-muted m-0">Manager: Jane Smith<br>Contact: 0722 987 654</p></div></div>
            <div class="col-md-4"><div class="branch-card shadow-sm"><h6>Kisumu Branch</h6><p class="small text-muted m-0">Manager: Peter Pan<br>Contact: 0733 111 222</p></div></div>
        </div>
    </main>
</body>
</html>
