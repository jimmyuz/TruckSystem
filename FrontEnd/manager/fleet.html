<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TCC - Fleet Monitoring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --sidebar-dark: #1a1d21; --nav-navy: #2c3e50; }
        body { background: #f8f9fa; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; margin: 0; }
        #sidebar { width: 260px; background: var(--sidebar-dark); color: white; display: flex; flex-direction: column; }
        .nav-link { color: #bdc3c7; padding: 12px 20px; text-decoration: none; display: block; }
        .nav-link:hover, .nav-link.active { background: #34495e; color: white; border-radius: 4px; }
        .main-content { flex-grow: 1; overflow-y: auto; }
        .header-bar { background: var(--nav-navy); color: white; padding: 15px 25px; display: flex; justify-content: space-between; }
        .map-box { background: white; border: 1px solid #dee2e6; border-radius: 8px; padding: 20px; height: 500px; position: relative; }
        .kenya-map { background: #e9ecef url('https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Kenya_location_map.svg/510px-Kenya_location_map.svg.png') no-repeat center; background-size: contain; height: 100%; border-radius: 8px; position: relative; }
        .truck-dot { width: 15px; height: 15px; border-radius: 50%; border: 2px solid white; position: absolute; cursor: pointer; }
    </style>
</head>
<body>
    <aside id="sidebar">
        <div class="p-4 border-bottom border-secondary text-center"><h3 class="fw-bold m-0">TCC</h3><small>Management</small></div>
        <nav class="p-3">
            <a href="manager.html" class="nav-link mb-1"><i class="fas fa-home me-2"></i> Overview</a>
            <a href="#" class="nav-link active mb-1"><i class="fas fa-map-marked-alt me-2"></i> Fleet Monitoring</a>
            <a href="revenue.html" class="nav-link mb-1"><i class="fas fa-file-invoice-dollar me-2"></i> Revenue Reports</a>
            <a href="analytics.html" class="nav-link mb-1"><i class="fas fa-chart-pie me-2"></i> Operations Analytics</a>
            <a href="branches.html" class="nav-link"><i class="fas fa-building me-2"></i> Branch Records</a>
        </nav>
    </aside>
    <main class="main-content">
        <header class="header-bar"><h5>Fleet Monitoring: Real-Time GPS Tracking</h5><span>Manager Access <i class="fas fa-user-shield ms-2"></i></span></header>
        <div class="container-fluid p-4">
            <div class="row">
                <div class="col-md-9">
                    <div class="map-box shadow-sm">
                        <div class="kenya-map">
                            <div class="truck-dot bg-success" title="Truck TCC-101 (Available)" style="top: 40%; left: 45%;"></div>
                            <div class="truck-dot bg-primary" title="Truck TCC-202 (In Transit)" style="top: 60%; left: 35%;"></div>
                            <div class="truck-dot bg-warning" title="Truck TCC-303 (Loading)" style="top: 55%; left: 65%;"></div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card p-3 shadow-sm mb-3">
                        <h6>Fleet Status Legend</h6>
                        <hr>
                        <div class="small mb-2"><i class="fas fa-circle text-success me-2"></i> Available (3)</div>
                        <div class="small mb-2"><i class="fas fa-circle text-primary me-2"></i> In Transit (4)</div>
                        <div class="small mb-2"><i class="fas fa-circle text-warning me-2"></i> Loading (1)</div>
                    </div>
                    <div class="card p-3 shadow-sm">
                        <h6>Alerts</h6>
                        <div class="alert alert-warning py-2 small">Truck TCC-405 idle > 2hrs</div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
