<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCC - Secure Staff Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #1a1d21; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; border-top: 5px solid #3498db; }
        .tcc-logo { font-weight: 800; font-size: 2.2rem; text-align: center; color: #1a1d21; margin-bottom: 0; }
        .sub-text { text-align: center; color: #6c757d; font-size: 0.9rem; margin-bottom: 25px; }
        .form-label { font-weight: 700; color: #2c3e50; font-size: 0.85rem; }
        .error-hint { color: #dc3545; font-size: 0.75rem; margin-top: 5px; display: none; }
        .btn-login { background: #3498db; color: white; font-weight: bold; width: 100%; padding: 12px; margin-top: 15px; border: none; transition: 0.3s; }
        .btn-login:hover { background: #2980b9; }
    </style>
</head>
<body>

    <div class="login-card shadow-lg">
        <div class="tcc-logo">TCC</div>
        <div class="sub-text">Logistics Management System</div>

        <form id="loginForm" onsubmit="return validateLogin(event)">
            <div class="mb-3">
                <label class="form-label">Staff Email</label>
                <input type="email" id="emailInput" class="form-control" placeholder="username@tcc.co.ke" required>
                <div id="emailError" class="error-hint">Email name must not contain numbers (e.g., john@tcc.co.ke).</div>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="passInput" class="form-control" placeholder="••••••••" required>
                <div id="passError" class="error-hint">
                    Must be 8+ chars with uppercase, lowercase, number, and symbol (@$!%*?&).
                </div>
            </div>

            <div class="d-flex justify-content-between mb-3">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="remember">
                    <label class="form-check-label small" for="remember">Remember me</label>
                </div>
                <a href="#" class="small text-decoration-none">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-login">ACCESS PORTAL</button>
            
            <div class="text-center mt-3">
                <small>Need access? <a href="register.html" class="text-decoration-none">Contact Admin</a></small>
            </div>
        </form>
    </div>

    <script>
        function validateLogin(event) {
            let valid = true;
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passInput').value;

            // 1. Email Validation: Name part (before @) must NOT have numbers
            // Regex: Start with letters, then @, then domain
            const emailPart = email.split('@')[0];
            const nameRegex = /^[a-zA-Z.]+$/; // Only letters and dots allowed before @
            
            if (!nameRegex.test(emailPart)) {
                document.getElementById('emailError').style.display = 'block';
                valid = false;
            } else {
                document.getElementById('emailError').style.display = 'none';
            }

            // 2. Strong Password Validation
            // Requires: 8 chars, 1 Uppercase, 1 Lowercase, 1 Number, 1 Special Char
            const strongPassRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
            
            if (!strongPassRegex.test(password)) {
                document.getElementById('passError').style.display = 'block';
                valid = false;
            } else {
                document.getElementById('passError').style.display = 'none';
            }

            // If valid, redirect to the overview/manager page
            if (valid) {
                window.location.href = "manager.html"; 
            }

            event.preventDefault(); // Stop form from auto-reloading page
            return false;
        }
    </script>
</body>
</html>
