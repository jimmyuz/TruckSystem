<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TCC Staff - Generate Dispatch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; display: flex; height: 100vh; margin: 0; }
        #sidebar { width: 260px; background: #1a1d21; color: white; }
        .main-content { flex-grow: 1; padding: 30px; }
        .dispatch-card { background: white; border-top: 5px solid #e67e22; border-radius: 8px; padding: 20px; }
    </style>
</head>
<body>
    <aside id="sidebar" class="p-4"><h3>TCC</h3><p>Dispatch Unit</p></aside>
    <main class="main-content">
        <h4><i class="fas fa-truck-loading me-2"></i> Dispatch Manifest Generation</h4>
        <div class="row mt-4">
            <div class="col-md-8">
                <div class="dispatch-card shadow-sm">
                    <h6>Select Consignments for Dispatch</h6>
                    <hr>
                    <div class="list-group">
                        <label class="list-group-item d-flex gap-3">
                            <input class="form-check-input flex-shrink-0" type="checkbox" value="" checked>
                            <span><strong>TCC-10245</strong> - Mombasa (12 m³)</span>
                        </label>
                        <label class="list-group-item d-flex gap-3">
                            <input class="form-check-input flex-shrink-0" type="checkbox" value="" checked>
                            <span><strong>TCC-10248</strong> - Mombasa (28 m³)</span>
                        </label>
                    </div>
                    <div class="mt-4 p-3 bg-light rounded text-center">
                        <p class="mb-1 text-muted">Total Volume Selected:</p>
                        <h4 class="text-success fw-bold">40 m³ / 40 m³ (TRUCK CAPACITY FULL)</h4>
                    </div>
                    <button class="btn btn-warning w-100 mt-3 fw-bold py-2">ASSIGN TO NEXT AVAILABLE TRUCK</button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
