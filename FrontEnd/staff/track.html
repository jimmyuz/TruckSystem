<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TCC Staff - Track Status</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f8f9fa; display: flex; height: 100vh; margin: 0; }
        #sidebar { width: 260px; background: #1a1d21; color: white; }
        .main-content { flex-grow: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .track-card { background: white; padding: 30px; border-radius: 12px; width: 100%; max-width: 600px; border: 1px solid #dee2e6; }
    </style>
</head>
<body>
    <aside id="sidebar" class="p-4"><h3>TCC</h3><hr><p>Tracking Hub</p></aside>
    <main class="main-content">
        <div class="track-card shadow-sm text-center">
            <h4 class="mb-4">Quick Consignment Lookup</h4>
            <div class="input-group mb-4">
                <input type="text" class="form-control form-control-lg" placeholder="Enter Consignment ID (e.g. TCC-10245)">
                <button class="btn btn-primary px-4">Track</button>
            </div>
            <div class="p-4 border rounded bg-light text-start">
                <p class="mb-2"><strong>ID:</strong> TCC-10245</p>
                <p class="mb-2"><strong>Last Known Location:</strong> Nairobi Main Hub</p>
                <p class="mb-0"><strong>Status:</strong> <span class="text-primary fw-bold">In Transit to Mombasa</span></p>
            </div>
        </div>
    </main>
</body>
</html>
