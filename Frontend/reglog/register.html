<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCC - Staff Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #1a1d21; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .auth-card { background: white; padding: 40px; border-radius: 12px; width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .tcc-logo { color: #1a1d21; font-weight: 800; font-size: 2rem; text-align: center; margin-bottom: 5px; }
        .form-label { font-weight: 600; font-size: 0.9rem; color: #444; }
        .btn-tcc { background: #2c3e50; color: white; font-weight: bold; transition: 0.3s; }
        .btn-tcc:hover { background: #34495e; color: white; }
        .error-msg { font-size: 0.75rem; color: #dc3545; display: none; margin-top: 4px; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="tcc-logo">TCC</div>
        <p class="text-center text-muted mb-4">Create Staff Account</p>
        
        <form id="regForm" onsubmit="return validateForm(event)">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" id="fullName" class="form-control" placeholder="John Doe" required>
                </div>
                <div id="nameError" class="error-msg">Names cannot contain numbers or special characters.</div>
            </div>

            <div class="mb-3">
                <label class="form-label">Work Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" class="form-control" placeholder="staff@tcc.co.ke" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" id="pass" class="form-control" placeholder="Min. 8 characters" required>
                </div>
                <div id="passError" class="error-msg">Password must be at least 8 chars with 1 letter and 1 number.</div>
            </div>

            <button type="submit" class="btn btn-tcc w-100 py-2 mt-2">REGISTER STAFF</button>
            <div class="text-center mt-3">
                <small>Already have an account? <a href="login.html" class="text-decoration-none">Login here</a></small>
            </div>
        </form>
    </div>

    <script>
        function validateForm(event) {
            let isValid = true;
            const name = document.getElementById('fullName').value;
            const pass = document.getElementById('pass').value;
            
            // 1. Name Validation (No numbers allowed)
            const nameRegex = /^[a-zA-Z\s]+$/;
            if (!nameRegex.test(name)) {
                document.getElementById('nameError').style.display = 'block';
                isValid = false;
            } else {
                document.getElementById('nameError').style.display = 'none';
            }

            // 2. Password Strength (Minimum 8 chars, at least one letter and one number)
            const passRegex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$/;
            if (!passRegex.test(pass)) {
                document.getElementById('passError').style.display = 'block';
                isValid = false;
            } else {
                document.getElementById('passError').style.display = 'none';
            }

            if (!isValid) event.preventDefault();
            return isValid;
        }
    </script>
</body>
</html>
